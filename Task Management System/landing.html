<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Task Manager</title>

<link rel="stylesheet"
href="css/landing.css">

</head>
<body>

<nav>

    <h2>Task Manager</h2>

    <button onclick="logout()">
        Logout
    </button>

</nav>

<section class="hero">

    <h1>
        Welcome to Task Management System
    </h1>

    <p>
        Manage your daily tasks easily.
    </p>

</section>

<div class="container">

    <h2>Add Task</h2>

    <input
        type="text"
        id="title"
        placeholder="Task Title"
    >

    <textarea
        id="description"
        placeholder="Description"
    ></textarea>

    <select id="status">

        <option>Pending</option>

        <option>In Progress</option>

        <option>On Hold</option>

        <option>Completed</option>

    </select>

    <button id="addBtn">
        Add Task
    </button>

    <br><br>

    <input
        type="text"
        id="search"
        placeholder="Search Task"
    >

    <br><br>

    <select id="filter">

        <option value="All">
            All
        </option>

        <option value="Pending">
            Pending
        </option>

        <option value="In Progress">
            In Progress
        </option>

        <option value="On Hold">
            On Hold
        </option>

        <option value="Completed">
            Completed
        </option>

    </select>

    <div id="taskList"></div>

</div>

<script src="script/task.js"></script>

</body>
</html>
